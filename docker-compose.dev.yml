services:

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # Chạy migrate trước khi start server — đảm bảo DB luôn up-to-date trên máy mới
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://devuser:devpassword@db:5432/devdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-not-for-production
      - DEBUG=True
      # Fernet key dùng cho dev — KHÔNG dùng cho production
      # Tạo key production: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - AGENT_ENCRYPTION_KEY=ZGV2LWFnZW50cy1rZXktb25seS1mb3ItZGV2bW9kZSE=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A tasks.celery worker --loglevel=debug --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://devuser:devpassword@db:5432/devdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-not-for-production
      - DEBUG=True
      - AGENT_ENCRYPTION_KEY=ZGV2LWFnZW50cy1rZXktb25seS1mb3ItZGV2bW9kZSE=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://web:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - REVALIDATE_SECRET=dev-revalidate-secret-change-in-production
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data_dev:
